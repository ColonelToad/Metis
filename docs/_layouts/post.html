---
layout: default
---

<article class="blog-post">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
      {% if page.author %}
        by {{ page.author }}
      {% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<nav class="post-nav">
  {% if page.previous %}
    <a href="{{ page.previous.url }}" class="prev">← Previous: {{ page.previous.title }}</a>
  {% endif %}
  {% if page.next %}
    <a href="{{ page.next.url }}" class="next">Next: {{ page.next.title }} →</a>
  {% endif %}
</nav>
