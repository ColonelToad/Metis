name: Tests (Python + Rust)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r research/requirements.txt
        pip install pytest pytest-cov
    
    - name: Run Python tests
      run: |
        pytest research/ -v --cov=research --cov-report=xml --tb=short
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: python

  test-rust:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run Rust tests (metis-core)
      run: |
        cd metis-core
        cargo test --verbose --lib
    
    - name: Run Rust tests (execution)
      run: |
        cd execution
        cargo test --verbose --lib
    
    - name: Run Rust tests (rag)
      run: |
        cd rag
        cargo test --verbose --lib
    
    - name: Check Rust formatting
      run: |
        cd metis-core && cargo fmt -- --check
        cd ../execution && cargo fmt -- --check
        cd ../rag && cargo fmt -- --check
    
    - name: Lint with Clippy
      run: |
        cd metis-core && cargo clippy -- -D warnings
        cd ../execution && cargo clippy -- -D warnings
        cd ../rag && cargo clippy -- -D warnings

  test-integration:
    runs-on: ubuntu-latest
    needs: [test-python, test-rust]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r research/requirements.txt
    
    - name: Run integration tests (DEV mode, synthetic data)
      env:
        METIS_MODE: DEV
      run: |
        cd research/data_ingest
        python -m pytest test_integration.py -v --tb=short -k "not slow"
