name: Tier 1 - Comprehensive Validation (Tests + Metrics)

on:
  pull_request:
    branches:
      - main
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ingest-tests:
    name: Ingester Tests (Mock Data)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r research/requirements.txt
      
      - name: Run ingester tests
        run: |
          python research/test_ingesters_mock.py
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ingester-test-results
          path: research/logs/
          retention-days: 30

  rag-tests:
    name: RAG Small-Scale Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r research/requirements.txt
      
      - name: Run RAG scaling test (50-1000 docs)
        run: |
          python research/test_rag_scaling.py | tee rag-test-output.json
      
      - name: Validate RAG performance
        run: |
          python -c "
          import json
          with open('rag-test-output.json') as f:
              results = json.load(f)
          
          # Check we completed all doc counts
          assert len(results['doc_counts']) >= 3, 'Should test at least 3 doc counts'
          
          # Check indexing doesn't exceed reasonable time
          max_time = max(results['indexing_times_ms'])
          assert max_time < 10000, f'Max indexing time {max_time}ms exceeds 10s threshold'
          
          print(f'✅ RAG tests passed')
          print(f'Tested doc counts: {results[\"doc_counts\"]}')
          print(f'Max indexing time: {max_time:.0f}ms')
          "
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: rag-test-results
          path: rag-test-output.json

  metrics-schema:
    name: Metrics Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r research/requirements.txt
      
      - name: Validate metrics DB schema
        run: |
          python -c "
          from research.metrics import MetricsCollector
          import sqlite3
          
          collector = MetricsCollector()
          
          # Verify tables exist
          conn = sqlite3.connect(collector.db_path)
          cursor = conn.cursor()
          
          cursor.execute(\"SELECT name FROM sqlite_master WHERE type='table'\")
          tables = {row[0] for row in cursor.fetchall()}
          
          required = {'runs', 'metrics', 'ingester_results'}
          assert required.issubset(tables), f'Missing tables: {required - tables}'
          
          # Verify columns
          for table in required:
              cursor.execute(f'PRAGMA table_info({table})')
              columns = {row[1] for row in cursor.fetchall()}
              print(f'✅ Table {table}: {len(columns)} columns')
          
          conn.close()
          print('✅ Metrics schema validation passed')
          "

  test-coordinator:
    name: Test Coordinator Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r research/requirements.txt
      
      - name: Verify test coordinator
        run: |
          python -c "
          from research.test_coordinator import TestCoordinator
          
          coordinator = TestCoordinator()
          suites = coordinator.list_suites()
          
          print(f'✅ Found {len(suites)} test suites:')
          for suite in suites:
              print(f'  - {suite[\"suite_id\"]}: {suite[\"name\"]}')
          
          assert len(suites) >= 5, 'Should have at least 5 test suites'
          "

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [ingest-tests, rag-tests, metrics-schema, test-coordinator]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "## Validation Results"
          echo ""
          echo "| Test | Status |"
          echo "|------|--------|"
          echo "| Ingester Tests | ${{ needs.ingest-tests.result }} |"
          echo "| RAG Tests | ${{ needs.rag-tests.result }} |"
          echo "| Metrics Schema | ${{ needs.metrics-schema.result }} |"
          echo "| Test Coordinator | ${{ needs.test-coordinator.result }} |"
          echo ""
          
          if [ "${{ job.status }}" == "failure" ]; then
            echo "⚠ Some validation checks failed"
            exit 1
          else
            echo "✅ All validation checks passed"
          fi
