version: '3.8'

services:
  # TimescaleDB for time-series market data
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: metis-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: metis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - metis-network

  # Milvus standalone for RAG vector search
  etcd:
    container_name: metis-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    networks:
      - metis-network

  minio:
    container_name: metis-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - metis-network

  milvus:
    container_name: metis-milvus
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - metis-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: metis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - metis-network

volumes:
  timescale_data:
  milvus_data:
  etcd_data:
  minio_data:
  redis_data:

networks:
  metis-network:
    driver: bridge
